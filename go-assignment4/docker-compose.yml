version: '3.8'

services:
  # --- Database Service ---
  db:
    image: postgres:15-alpine
    container_name: go_assignment4_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app_network

  # --- Golang Application Service ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go_assignment4_app
    restart: on-failure
    ports:
      - "8000:8000"
    environment:
      # DB Connection (Host is 'db' - the service name above)
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: disable
      # App Config
      PORT: 8000
      API_KEY: ${API_KEY}
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

volumes:
  db_data:

networks:
  app_network:
    driver: bridge